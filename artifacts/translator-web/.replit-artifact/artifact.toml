kind = "web"
previewPath = "/"
title = "Indonesian Translator"
version = "1.0.0"
id = "artifacts/translator-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24387

[services.development]
run = "pnpm --filter @workspace/translator-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/translator-web", "run", "build" ]
publicDir = "artifacts/translator-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24387"
BASE_PATH = "/"
